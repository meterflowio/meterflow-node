name: CI
on:
  push: { branches: [main] }
  pull_request:
permissions: { contents: read }
jobs:
  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run build
      - run: node -e "const { MeterFlow } = require('./dist/index.cjs'); console.log('CJS ok');"
      - run: node --input-type=module -e "import { MeterFlow } from './dist/index.mjs'; console.log('ESM ok');"
